services:
  - type: web
    name: scoutpost
    runtime: docker
    plan: starter
    region: frankfurt
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: AWS_API_BASE_URL
        value: https://kubbp7dr0b.execute-api.eu-central-1.amazonaws.com/dev
      - key: VITE_API_URL
        sync: false
      - key: DEBUG
        value: false
      - key: PUBLIC_MAPTILER_API_KEY
        sync: false
      # Supabase — auth broker (backend runtime)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: APP_POST_LOGIN_REDIRECT
        value: https://scoutpost.ai/auth/callback
      # Webhook paused until PR 2a ships post-cutover
      - key: MUCKROCK_WEBHOOK_PAUSED
        value: "true"
      # Supabase — frontend build-time (baked into SPA bundle via Vite)
      - key: PUBLIC_SUPABASE_URL
        sync: false
      - key: PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: PUBLIC_DEPLOYMENT_TARGET
        value: supabase
      # SaaS: MuckRock button on /login. OSS leaves this blank and the email/password form renders.
      - key: PUBLIC_MUCKROCK_ENABLED
        value: "true"
      # One external AI credential for Google Vertex extraction and 768d
      # Gemini embeddings through OpenRouter's ZDR route.
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LLM_MODEL
        value: google/gemini-2.5-flash-lite

  # Self-hosted scrape service (SCRAPING-MIGRATION-PRD U6): Crawl4AI browser
  # rendering + poppler pdftotext, replacing Firecrawl. Reached by the Supabase
  # edge functions over the public internet, bearer-authed.
  # PROVISIONING (manual, one-time): after first deploy, set the two secrets in
  # the Render dashboard, then mirror them into Supabase function secrets:
  #   supabase secrets set SCRAPE_SERVICE_URL=https://scoutpost-scrape.onrender.com \
  #                        SCRAPE_SERVICE_TOKEN=<same value as below>
  - type: web
    name: scoutpost-scrape
    runtime: docker
    plan: standard
    region: frankfurt
    branch: main
    dockerfilePath: ./scrape-service/Dockerfile
    dockerContext: ./scrape-service
    healthCheckPath: /health
    envVars:
      # Mandatory bearer token — the service renders arbitrary URLs and must
      # never run as an open proxy. Generate once; mirror into Supabase secrets.
      - key: SCRAPE_SERVICE_TOKEN
        sync: false
      # Enables the Google Vertex native-PDF fallback through OpenRouter.
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PORT
        value: "8080"
