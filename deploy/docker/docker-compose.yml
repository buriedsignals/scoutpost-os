# coJournalist Self-Hosted Stack
#
# Usage:
#   1. Copy .env.example to .env and fill in all values
#   2. Run: docker compose up -d
#   3. Confirm the one-shot migrations service completed successfully
#   4. Open http://localhost:3000
#
# Architecture:
#   kong (API gateway) -> auth (GoTrue) + rest (PostgREST) + edge-functions
#   backend (FastAPI) -> db (PostgreSQL) directly via DATABASE_URL
#   frontend (SvelteKit) -> kong (for Supabase client) + backend (for API)

services:
  # =========================================================================
  # Supabase Core
  # =========================================================================

  db:
    image: supabase/postgres:15.6.1.143
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      # Enable required extensions at init
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init/00000_init_roles.sh:/docker-entrypoint-initdb.d/00000_init_roles.sh:ro
      - ../../supabase/migrations/00001_extensions.sql:/docker-entrypoint-initdb.d/00001_extensions.sql:ro
      - ../../supabase/migrations:/app-migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  auth:
    image: supabase/gotrue:v2.170.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_API_HOST: 0.0.0.0
      API_EXTERNAL_URL: ${SITE_URL}
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
    restart: unless-stopped

  rest:
    image: postgrest/postgrest:v12.2.8
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    restart: unless-stopped

  edge-functions:
    image: supabase/edge-runtime:v1.67.4
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_DB_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      VERIFY_JWT: "false"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      # Self-hosted scrape service (SCRAPING-MIGRATION-PRD U6) — the Firecrawl
      # replacement. Default stays firecrawl: several call sites (web-scout
      # baseline, civic link-harvest, Beat direct scrapes) still call Firecrawl
      # directly and migrate to the port in later units, so crawl4ai is not yet
      # a complete standalone provider. Self-hosters set SCRAPE_PROVIDER=crawl4ai
      # only after those land (tracked in SCRAPING-MIGRATION-PRD). Until then a
      # FIRECRAWL_API_KEY is required.
      SCRAPE_PROVIDER: ${SCRAPE_PROVIDER:-firecrawl}
      SCRAPE_SERVICE_URL: http://scrape-service:8080
      SCRAPE_SERVICE_TOKEN: ${SCRAPE_SERVICE_TOKEN:-local-scrape-token}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      # Beat Scout retrieval port (Exa-only since U5).
      EXA_API_KEY: ${EXA_API_KEY:-}
      APIFY_API_TOKEN: ${APIFY_API_TOKEN}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-scouts@newsroom.org}
    command: start --main-service /home/deno/functions/main
    volumes:
      - ../../supabase/functions:/home/deno/functions
    restart: unless-stopped

  # Self-hosted scraping: Crawl4AI browser rendering + poppler pdftotext,
  # replacing Firecrawl (SCRAPING-MIGRATION-PRD). Default-on — the headline OSS
  # win is that self-hosters no longer need a paid Firecrawl key.
  scrape-service:
    build:
      context: ../../scrape-service
      dockerfile: Dockerfile
    environment:
      SCRAPE_SERVICE_TOKEN: ${SCRAPE_SERVICE_TOKEN:-local-scrape-token}
      # Google Vertex native-PDF fallback through OpenRouter.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      PORT: "8080"
    shm_size: 1gb
    restart: unless-stopped

  kong:
    image: kong:3.8
    depends_on:
      - auth
      - rest
      - edge-functions
    ports:
      - "8000:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
    volumes:
      - ./kong.yml:/kong/kong.yml:ro
    restart: unless-stopped

  # =========================================================================
  # Application
  # =========================================================================

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_started
      migrations:
        condition: service_completed_successfully
    ports:
      - "8080:8000"
    environment:
      DEPLOYMENT_TARGET: supabase
      SUPABASE_URL: http://kong:8000
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-google/gemini-2.5-flash-lite}
      EXA_API_KEY: ${EXA_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-scouts@newsroom.org}
      APIFY_API_TOKEN: ${APIFY_API_TOKEN}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.dev
      args:
        PUBLIC_DEPLOYMENT_TARGET: supabase
        PUBLIC_SUPABASE_URL: http://localhost:8000
        PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        PUBLIC_MAPTILER_API_KEY: ${PUBLIC_MAPTILER_API_KEY:-}
        PUBLIC_SELF_HOST_LOGIN_NOTE: ${PUBLIC_SELF_HOST_LOGIN_NOTE:-}
    depends_on:
      - backend
    ports:
      - "3000:5173"
    environment:
      BACKEND_URL: http://backend:8000
    restart: unless-stopped

  migrations:
    image: supabase/postgres:15.6.1.143
    depends_on:
      auth:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - ../../supabase/migrations:/migrations:ro
      - ./run-app-migrations.sh:/run-app-migrations.sh:ro
    entrypoint: ["/bin/bash", "/run-app-migrations.sh"]
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: "no"

volumes:
  db-data:
