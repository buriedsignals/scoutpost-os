name: Weekly OSS Benchmarks

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: page
            command: deno run --allow-env --allow-net --allow-read=. scripts/benchmark-web.ts
          - name: page-subpage
            command: deno run --allow-env --allow-net --allow-read=. scripts/benchmark-subpage-follow.ts
          - name: beat
            command: deno run --allow-env --allow-net --allow-read=. scripts/benchmark-beat.ts
          - name: civic
            command: deno run --allow-env --allow-net --allow-read=. --allow-write=scripts/reports scripts/benchmark-civic.ts
          - name: social
            command: deno run --allow-env --allow-net --allow-read=. --allow-write=scripts/reports scripts/benchmark-social.ts
          - name: apify-actors
            command: deno run --allow-env --allow-net --allow-write=scripts/reports scripts/benchmark-apify-actors.ts
    env:
      COJO_BENCHMARK_TARGET: oss
      COJO_BENCHMARK_PROJECT: "1"
      SUPABASE_URL: ${{ secrets.OSS_BENCH_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.OSS_BENCH_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.OSS_BENCH_SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.OSS_BENCH_SUPABASE_SERVICE_ROLE_KEY }}
      INTERNAL_SERVICE_KEY: ${{ secrets.OSS_BENCH_INTERNAL_SERVICE_KEY }}
      APIFY_API_TOKEN: ${{ secrets.OSS_BENCH_APIFY_API_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.OSS_BENCH_GEMINI_API_KEY }}
      FIRECRAWL_API_KEY: ${{ secrets.OSS_BENCH_FIRECRAWL_API_KEY }}
      RESEND_API_KEY: ${{ secrets.OSS_BENCH_RESEND_API_KEY }}
      COJO_BENCH_INSTAGRAM_HANDLE: ${{ vars.COJO_BENCH_INSTAGRAM_HANDLE }}
      COJO_BENCH_X_HANDLE: ${{ vars.COJO_BENCH_X_HANDLE }}
      COJO_BENCH_FACEBOOK_HANDLE: ${{ vars.COJO_BENCH_FACEBOOK_HANDLE }}
      COJO_BENCH_TIKTOK_HANDLE: ${{ vars.COJO_BENCH_TIKTOK_HANDLE }}
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Validate benchmark secrets
        run: |
          missing=0
          for name in SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY APIFY_API_TOKEN GEMINI_API_KEY FIRECRAWL_API_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for weekly OSS benchmarks"
              missing=1
            fi
          done
          exit "$missing"

      - name: Run ${{ matrix.name }} benchmark
        id: run
        run: ${{ matrix.command }}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.name }}-reports
          path: scripts/reports/**
          if-no-files-found: ignore

      - name: Open failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `OSS benchmark failed: ${process.env.BENCH_NAME}`;
            const body = [
              `Weekly OSS benchmark **${process.env.BENCH_NAME}** failed.`,
              ``,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `Check the uploaded benchmark artifacts for the detailed report.`
            ].join('\n');
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const found = existing.find((issue) => issue.title === title);
            if (found) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: found.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }
        env:
          BENCH_NAME: ${{ matrix.name }}
