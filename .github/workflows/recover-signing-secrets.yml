name: One-time signing secret recovery

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: one-time-signing-secret-recovery
  cancel-in-progress: false

jobs:
  recover:
    if: github.repository == 'buriedsignals/scoutpost'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Verify recovery inputs
        shell: bash
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          for name in \
            APPLE_CERT_P12 APPLE_CERT_PASSWORD APPLE_SIGNING_IDENTITY \
            APPLE_TEAM_ID APPLE_API_KEY_P8 APPLE_API_KEY_ID \
            APPLE_API_ISSUER_ID
          do
            if [ -z "${!name:-}" ]; then
              printf 'Required recovery input is unavailable: %s\n' "$name" >&2
              exit 1
            fi
          done

      - name: Create recipient-encrypted recovery bundle
        id: encrypt
        shell: bash
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          umask 077

          recovery_dir="${RUNNER_TEMP}/signing-secret-recovery"
          output_dir="${RUNNER_TEMP}/encrypted-recovery"
          mkdir -p "$recovery_dir" "$output_dir"

          printf '%s' "$APPLE_CERT_P12" | base64 --decode > "$recovery_dir/Certificates.p12"
          printf '%s' "$APPLE_CERT_PASSWORD" > "$recovery_dir/APPLE_CERT_PASSWORD"
          printf '%s' "$APPLE_API_KEY_P8" > "$recovery_dir/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_ID" > "$recovery_dir/APPLE_API_KEY_ID"
          printf '%s' "$APPLE_API_ISSUER_ID" > "$recovery_dir/APPLE_API_ISSUER_ID"
          printf '%s' "$APPLE_SIGNING_IDENTITY" > "$recovery_dir/APPLE_SIGNING_IDENTITY"
          printf '%s' "$APPLE_TEAM_ID" > "$recovery_dir/APPLE_TEAM_ID"

          openssl rand -hex 32 > "${RUNNER_TEMP}/bundle.pass"
          tar -C "$recovery_dir" -czf "${RUNNER_TEMP}/release-secrets.tgz" .
          openssl enc -aes-256-cbc -pbkdf2 -iter 200000 -salt \
            -in "${RUNNER_TEMP}/release-secrets.tgz" \
            -out "$output_dir/release-secrets.tgz.enc" \
            -pass file:"${RUNNER_TEMP}/bundle.pass"
          openssl pkeyutl -encrypt -pubin \
            -inkey .github/recovery-public.pem \
            -in "${RUNNER_TEMP}/bundle.pass" \
            -out "$output_dir/bundle.pass.enc" \
            -pkeyopt rsa_padding_mode:oaep \
            -pkeyopt rsa_oaep_md:sha256
          sha256sum "$output_dir/release-secrets.tgz.enc" \
            "$output_dir/bundle.pass.enc" > "$output_dir/SHA256SUMS"

          rm -rf "$recovery_dir"
          rm -f "${RUNNER_TEMP}/release-secrets.tgz" "${RUNNER_TEMP}/bundle.pass"
          echo "artifact_path=$output_dir" >> "$GITHUB_OUTPUT"

      - name: Upload encrypted recovery artifact
        uses: actions/upload-artifact@v4
        with:
          name: signing-secret-recovery-${{ github.run_id }}
          path: ${{ steps.encrypt.outputs.artifact_path }}
          if-no-files-found: error
          retention-days: 1
