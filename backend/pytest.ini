[pytest]
asyncio_default_fixture_loop_scope = function
testpaths = tests/unit
filterwarnings =
    ignore:'asyncio.iscoroutinefunction' is deprecated and slated for removal in Python 3.16; use inspect.iscoroutinefunction\(\) instead:DeprecationWarning:slowapi\.extension
    ignore:'asyncio.AbstractEventLoopPolicy' is deprecated and slated for removal in Python 3.16:DeprecationWarning:pytest_asyncio\.plugin
