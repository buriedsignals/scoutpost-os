<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Preconnect to Google Fonts — the @import in app.css would otherwise
		     wait for CSS to parse before opening the font CDN connection. -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<title>Scoutpost — AI source monitoring and alerts</title>
		<meta name="description" content="Scoutpost connects your AI agent to scouts that monitor pages, social profiles, civic sources, and beats so your team can surface leads without rechecking sources by hand." />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Scoutpost — AI source monitoring and alerts" />
		<meta property="og:description" content="AI scouts that watch pages, social profiles, civic sources, and beats. Trigger them from Claude, ChatGPT, Gemini, or any agent." />
		<meta property="og:image" content="%sveltekit.assets%/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Scoutpost — AI source monitoring and alerts" />
		<meta name="twitter:description" content="AI scouts that watch pages, social profiles, civic sources, and beats. Trigger them from Claude, ChatGPT, Gemini, or any agent." />
		<meta name="twitter:image" content="%sveltekit.assets%/og-image.png" />

		<!-- Prevent flash of unstyled content -->
		<style>
			html { visibility: hidden; }
			html.ready { visibility: visible; }
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			// Show content once DOM is ready and styles are applied
			document.documentElement.classList.add('ready');
		</script>
	</body>
</html>
